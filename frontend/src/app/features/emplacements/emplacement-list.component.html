<div class="emplacement-list-container">
  <div class="header">
    <h2>📍 Gestion des Emplacements</h2>
    <button class="btn btn-primary" (click)="addEmplacement()">
      ➕ Nouvel Emplacement
    </button>
  </div>

  <!-- Filtres -->
  <div class="filters">
    <div class="form-group">
      <label>Rechercher</label>
      <input type="text" [(ngModel)]="searchTerm"
             (keyup.enter)="applyFilters()"
             placeholder="Site, étage, rosace...">
    </div>

    <div class="form-group">
      <label>Site</label>
      <select [(ngModel)]="selectedSite" (change)="applyFilters()">
        <option value="">Tous</option>
        <option *ngFor="let site of sites" [value]="site">{{ site }}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Étage</label>
      <select [(ngModel)]="selectedEtage" (change)="applyFilters()">
        <option value="">Tous</option>
        <option *ngFor="let etage of etages" [value]="etage">{{ etage }}</option>
      </select>
    </div>

    <button class="btn btn-outline" (click)="clearFilters()">
      🔄 Réinitialiser
    </button>
  </div>

  <!-- Chargement -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <span>Chargement...</span>
  </div>

  <!-- Erreur -->
  <div *ngIf="error" class="alert alert-danger">
    ⚠️ {{ error }}
  </div>

  <!-- Tableau -->
  <div *ngIf="!loading && !error" class="table-card">
    <table class="table">
      <thead>
        <tr>
          <th>Site</th>
          <th>Étage</th>
          <th>Rosace</th>
          <th>Position Exacte</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let emp of emplacements">
          <td>{{ emp.site }}</td>
          <td>{{ emp.etage }}</td>
          <td>
            <span class="badge badge-info">Rosace {{ emp.rosace }}</span>
          </td>
          <td>{{ emp.exact_position || '-' }}</td>
          <td>
            <div class="action-buttons">
              <button class="btn btn-sm btn-info"
                      (click)="editEmplacement(emp.id!)">
                ✏️ Modifier
              </button>
              <button class="btn btn-sm btn-danger"
                      (click)="deleteEmplacement(emp.id!)">
                🗑️ Supprimer
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="emplacements.length === 0">
          <td colspan="5" class="no-data">
            Aucun emplacement trouvé.
            <span (click)="addEmplacement()"
                  style="cursor:pointer; color:#667eea; margin-left:8px">
              Créer le premier emplacement →
            </span>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination" *ngIf="totalItems > pageSize">
      <button class="btn btn-sm btn-outline"
              [disabled]="currentPage === 0"
              (click)="onPageChange({pageIndex: currentPage - 1, pageSize: pageSize})">
        ← Précédent
      </button>
      <span class="page-info">
        Page {{ currentPage + 1 }} / {{ getTotalPages() }}
      </span>
      <button class="btn btn-sm btn-outline"
              [disabled]="(currentPage + 1) * pageSize >= totalItems"
              (click)="onPageChange({pageIndex: currentPage + 1, pageSize: pageSize})">
        Suivant →
      </button>
    </div>
  </div>
</div>
