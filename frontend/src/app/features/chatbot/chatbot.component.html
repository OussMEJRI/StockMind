<div class="chatbot-container">
  <div class="chatbot-header">
    <div class="header-title">
      <h1>🤖 Assistant IT Inventory</h1>
      <p class="subtitle">Posez vos questions sur l'inventaire</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-refresh" (click)="refreshData()" [disabled]="loading">
        🔄 Actualiser
      </button>
      <button class="btn btn-clear" (click)="clearChat()">
        🗑️ Effacer
      </button>
    </div>
  </div>

  <div class="messages-container" #messagesContainer>
    <div *ngFor="let message of messages" 
         [class]="message.isUser ? 'message user-message' : 'message bot-message'">
      <div class="message-avatar">
        {{ message.isUser ? '👤' : '🤖' }}
      </div>
      <div class="message-content">
        <div class="message-text" [innerHTML]="formatMessage(message.text)"></div>
        <div class="message-time">
          {{ message.timestamp | date:'HH:mm' }}
        </div>
      </div>
    </div>

    <div *ngIf="loading" class="message bot-message">
      <div class="message-avatar">🤖</div>
      <div class="message-content">
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="input-container">
    <div class="quick-actions">
      <button class="quick-btn" (click)="userInput = 'Combien d\'équipements ?'; sendMessage()">
        📊 Statistiques
      </button>
      <button class="quick-btn" (click)="userInput = 'Équipements disponibles ?'; sendMessage()">
        ✅ Disponibles
      </button>
      <button class="quick-btn" (click)="userInput = 'Combien de PC ?'; sendMessage()">
        💻 PC
      </button>
      <button class="quick-btn" (click)="userInput = 'Aide'; sendMessage()">
        ❓ Aide
      </button>
    </div>
    
    <div class="input-wrapper">
      <textarea 
        [(ngModel)]="userInput"
        (keypress)="onKeyPress($event)"
        placeholder="Posez votre question... (Entrée pour envoyer)"
        rows="2"
        [disabled]="!dataLoaded || loading">
      </textarea>
      <button 
        class="btn btn-send" 
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || !dataLoaded || loading">
        📤 Envoyer
      </button>
    </div>
  </div>
</div>
