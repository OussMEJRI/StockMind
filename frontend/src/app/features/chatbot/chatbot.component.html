<!-- Bouton flottant -->
<div class="chat-fab" (click)="toggleChat()">
  <span class="fab-icon">🤖</span>
  <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
</div>

<!-- Fenêtre de chat -->
<div class="chat-window" [class.open]="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <span class="bot-avatar">🤖</span>
      <div>
        <div class="bot-name">Assistant StockMind</div>
        <div class="bot-status">
          <span class="status-dot"></span> En ligne · Temps réel
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" (click)="clearChat()" title="Effacer">🗑️</button>
      <button class="btn-icon" (click)="toggleChat()" title="Fermer">✕</button>
    </div>
  </div>

  <!-- Suggestions rapides -->
  <div class="suggestions-bar" *ngIf="messages.length <= 1">
    <button class="chip" (click)="quickSend('statistiques')">📊 Stats</button>
    <button class="chip" (click)="quickSend('équipements en stock')">📦 Stock</button>
    <button class="chip" (click)="quickSend('liste des laptops')">💻 Laptops</button>
    <button class="chip" (click)="quickSend('liste des employés')">👥 Employés</button>
    <button class="chip" (click)="quickSend('équipements en maintenance')">🔧 Maintenance</button>
    <button class="chip" (click)="quickSend('aide')">❓ Aide</button>
  </div>

  <!-- Messages -->
  <div class="messages-container" #messagesContainer>
    <div
      *ngFor="let msg of messages; trackBy: trackByIndex"
      class="message-wrapper"
      [ngClass]="msg.isUser ? 'user-wrapper' : 'bot-wrapper'">

      <div class="avatar" *ngIf="!msg.isUser">🤖</div>

      <div class="bubble"
           [ngClass]="msg.isUser ? 'user-bubble' : (msg.isLoading ? 'loading-bubble' : 'bot-bubble')">
        <!-- Loading dots -->
        <div *ngIf="msg.isLoading" class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <!-- Texte -->
        <div *ngIf="!msg.isLoading" [innerHTML]="formatMessage(msg.text)"></div>
        <!-- Heure -->
        <div class="msg-time" *ngIf="!msg.isLoading">
          {{ msg.timestamp | date:'HH:mm' }}
        </div>
      </div>

      <div class="avatar user-av" *ngIf="msg.isUser">👤</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input
      #inputField
      type="text"
      [(ngModel)]="userInput"
      (keydown)="onKeyPress($event)"
      placeholder="Posez votre question..."
      class="chat-input"
    />
    <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim()">➤</button>
  </div>

</div>
